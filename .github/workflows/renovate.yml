name: Renovate (monthly)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 1 * *' # 02:00 UTC on the 1st of every month

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.17
        with:
          configurationFile: .github/renovate-config.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: info
